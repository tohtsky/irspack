name: Full Test & Upload coverage
on: [push, pull_request]
jobs:
  run_pytest_upload_coverage:
    runs-on: ubuntu-latest
    env:
      OS: ubuntu-latest
      # scikit-build-core passes these settings through to CMake.  Keep the
      # generated gcno/gcda files in the build directory used below by lcov.
      CMAKE_BUILD_TYPE: Debug
      # pytest can exercise the extension from multiple threads/processes.
      # Atomic gcov counter updates prevent corrupted (.gcda) counters.
      CMAKE_ARGS: >-
        -DCMAKE_CXX_FLAGS=--coverage\ -fprofile-update=atomic
        -DCMAKE_SHARED_LINKER_FLAGS=--coverage
    steps:
      - uses: actions/checkout@v4
        with:
          submodule: recursive
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build instrumented extension modules
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends lcov
          uv sync --group dev --verbose
      - name: Run pytest
        run: |
          uv pip install jaxlib==0.10.0 jax==0.10.0 dm-haiku optax || echo "JAX installation failed, skipping MultVAE tests"
          uv pip install lightfm || echo "LightFM installation failed, skipping BPR tests"
          uv run pytest tests \
            --cov=./src/irspack \
            --cov-report=term-missing \
            --cov-report=xml:coverage-python.xml
      - name: Generate C++ coverage report
        run: |
          # nanobind is built from uv's temporary cache, which may be removed
          # before capture. Its data is excluded below, so do not require its
          # source headers to remain available. GCC 13 also emits harmless
          # unexecuted-block metadata warnings for template-heavy dependencies.
          lcov --capture \
            --directory build \
            --output-file coverage-cpp.info \
            --ignore-errors mismatch,source,gcov
          lcov --extract coverage-cpp.info "$GITHUB_WORKSPACE/cpp_source/*" \
            --output-file coverage-cpp.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage-python.xml,./coverage-cpp.info
          disable_search: true
          fail_ci_if_error: false
          verbose: true
